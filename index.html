<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中標津 Link</title>

<style>
* { box-sizing: border-box; }
body { margin:0; font-family:Arial; background:#f6fff6; padding:20px; }

.card {
  background:white;
  padding:15px;
  border-radius:16px;
  margin-bottom:10px;
}

button {
  background:#16a34a;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" style="display:flex;justify-content:center;align-items:center;height:100vh;">
  <div class="card" style="max-width:320px;width:100%;text-align:center;">
    <h2>ログイン</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <h3 id="user"></h3>

  <button onclick="show('home')">🏠 ホーム</button>
  <button onclick="show('medical')">🏥 医療</button>
  <button onclick="show('booking')">📋 予約一覧</button>
  <button onclick="show('tourism')">🗺️ マップ</button>

  <!-- HOME -->
  <div id="home" class="card">
    <h3>病院</h3>
    <button onclick="openBooking('中標津病院')">中標津病院</button>
    <button onclick="openBooking('さくらクリニック')">さくらクリニック</button>
  </div>

  <!-- FORM -->
  <div id="medical" class="card" style="display:none;">
    <input id="place" placeholder="病院名">
    <input id="date" type="date">
    <input id="time" type="time">
    <button onclick="book()">予約する</button>
  </div>

  <!-- LIST -->
  <div id="booking" class="card" style="display:none;">
    <div id="bookingList"></div>
  </div>

  <!-- MAP -->
  <div id="tourism" class="card" style="display:none;">
    <iframe src="https://www.google.com/maps?q=中標津町&output=embed"
    width="100%" height="300" style="border:0;border-radius:12px;"></iframe>
  </div>

</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
  <div class="card" style="max-width:400px;width:90%;">
    <h2>✅ 予約完了</h2>
    <p id="info"></p>
    <iframe id="mapFrame" width="100%" height="200"></iframe>
    <br><br>
    <a id="routeLink" target="_blank">📍 ルート</a>
    <br><br>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
let bookings = [];

function login(){
  const email = document.getElementById('email').value;
  if(email){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('user').innerText = email;
  }
}

function show(section){
  ['home','medical','booking','tourism'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.getElementById(section).style.display='block';
}

function openBooking(place){
  show('medical');
  document.getElementById('place').value = place;
}

function book(){
  const place = document.getElementById('place').value;
  const date = document.getElementById('date').value;
  const time = document.getElementById('time').value;

  if(!place || !date || !time){
    alert('全て入力してください');
    return;
  }

  bookings.push({place, date, time});
  renderBookings();

  const encoded = encodeURIComponent(place);

  document.getElementById('info').innerText = `${place}\n${date} ${time}`;
  document.getElementById('mapFrame').src = `https://www.google.com/maps?q=${encoded}&output=embed`;
  document.getElementById('routeLink').href = `https://www.google.com/maps/dir/?api=1&destination=${encoded}`;

  document.getElementById('modal').style.display='flex';
}

function renderBookings(){
  const el = document.getElementById('bookingList');
  el.innerHTML = '';

  bookings.forEach((b,i)=>{
    el.innerHTML += `
    <div class="card">
      <h3>${b.place}</h3>
      <p>📅 <input type="date" value="${b.date}" onchange="updateDate(${i}, this.value)"></p>
      <p>⏰ <input type="time" value="${b.time}" onchange="updateTime(${i}, this.value)"></p>
      <a href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(b.place)}" target="_blank">🚗 ルート</a>
    </div>`;
  });
}

function updateDate(i,v){ bookings[i].date = v; }
function updateTime(i,v){ bookings[i].time = v; }

function closeModal(){
  document.getElementById('modal').style.display='none';
}
</script>

</body>
</html>
